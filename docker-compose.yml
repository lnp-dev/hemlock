version: '3.8'

services:
  db:
    image: postgres:15
    container_name: scamai_db
    environment:
      POSTGRES_USER: scamadmin
      POSTGRES_PASSWORD: scampassword
      POSTGRES_DB: detection_logs
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
